<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Deep space background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="60%" stop-color="#060d1a"/>
      <stop offset="100%" stop-color="#020608"/>
    </radialGradient>

    <!-- Sun core gradient — deep gold center, amber outer -->
    <radialGradient id="sunCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fffbe0"/>
      <stop offset="25%"  stop-color="#fde68a"/>
      <stop offset="55%"  stop-color="#f59e0b"/>
      <stop offset="80%"  stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>

    <!-- Sun corona glow -->
    <radialGradient id="sunCorona" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fbbf24" stop-opacity="0.7"/>
      <stop offset="40%"  stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="70%"  stop-color="#d97706" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#92400e" stop-opacity="0"/>
    </radialGradient>

    <!-- Outer space glow around whole icon -->
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0e2a5e" stop-opacity="0.0"/>
      <stop offset="75%"  stop-color="#0e2a5e" stop-opacity="0.0"/>
      <stop offset="95%"  stop-color="#1d4ed8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.05"/>
    </radialGradient>

    <!-- Orbit path gradient — cyan glow -->
    <linearGradient id="orbitGlow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#67e8f9" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="orbitGlow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#38bdf8" stop-opacity="0.7"/>
      <stop offset="50%"  stop-color="#7dd3fc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="orbitGlow3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#818cf8" stop-opacity="0.6"/>
      <stop offset="50%"  stop-color="#a5b4fc" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.08"/>
    </linearGradient>

    <!-- Planet gradients -->
    <radialGradient id="planet1" cx="35%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </radialGradient>
    <radialGradient id="planet2" cx="35%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </radialGradient>
    <radialGradient id="planet3" cx="35%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </radialGradient>
    <radialGradient id="planet4" cx="35%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#86efac"/>
      <stop offset="100%" stop-color="#166534"/>
    </radialGradient>
    <radialGradient id="planet5" cx="35%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#fca5a5"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </radialGradient>

    <!-- Sun glow filter -->
    <filter id="sunGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for planets -->
    <filter id="planetGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Orbit line blur/glow -->
    <filter id="orbitLineGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft clip for rounded square icon shape -->
    <clipPath id="iconClip">
      <rect x="0" y="0" width="256" height="256" rx="48" ry="48"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="256" height="256" rx="48" ry="48" fill="url(#bgGrad)"/>

  <!-- Subtle outer vignette glow -->
  <rect x="0" y="0" width="256" height="256" rx="48" ry="48" fill="url(#outerGlow)"/>

  <!-- Star field — tiny white dots for depth -->
  <g opacity="0.6">
    <circle cx="22"  cy="18"  r="0.8" fill="#e0f2fe"/>
    <circle cx="45"  cy="38"  r="0.6" fill="#bae6fd"/>
    <circle cx="68"  cy="14"  r="1.0" fill="#e0f2fe"/>
    <circle cx="88"  cy="52"  r="0.7" fill="#f0f9ff"/>
    <circle cx="110" cy="24"  r="0.5" fill="#e0f2fe"/>
    <circle cx="145" cy="18"  r="0.9" fill="#bae6fd"/>
    <circle cx="172" cy="42"  r="0.6" fill="#e0f2fe"/>
    <circle cx="195" cy="22"  r="0.8" fill="#f0f9ff"/>
    <circle cx="220" cy="48"  r="0.7" fill="#bae6fd"/>
    <circle cx="238" cy="28"  r="0.5" fill="#e0f2fe"/>
    <circle cx="14"  cy="72"  r="0.7" fill="#f0f9ff"/>
    <circle cx="30"  cy="95"  r="0.5" fill="#bae6fd"/>
    <circle cx="18"  cy="130" r="0.8" fill="#e0f2fe"/>
    <circle cx="38"  cy="158" r="0.6" fill="#f0f9ff"/>
    <circle cx="20"  cy="185" r="0.7" fill="#bae6fd"/>
    <circle cx="42"  cy="210" r="0.5" fill="#e0f2fe"/>
    <circle cx="25"  cy="232" r="0.9" fill="#f0f9ff"/>
    <circle cx="58"  cy="245" r="0.6" fill="#bae6fd"/>
    <circle cx="92"  cy="238" r="0.7" fill="#e0f2fe"/>
    <circle cx="120" cy="248" r="0.5" fill="#f0f9ff"/>
    <circle cx="155" cy="242" r="0.8" fill="#bae6fd"/>
    <circle cx="185" cy="232" r="0.6" fill="#e0f2fe"/>
    <circle cx="212" cy="245" r="0.7" fill="#f0f9ff"/>
    <circle cx="236" cy="230" r="0.5" fill="#bae6fd"/>
    <circle cx="248" cy="190" r="0.8" fill="#e0f2fe"/>
    <circle cx="242" cy="155" r="0.6" fill="#f0f9ff"/>
    <circle cx="250" cy="120" r="0.7" fill="#bae6fd"/>
    <circle cx="240" cy="88"  r="0.5" fill="#e0f2fe"/>
    <circle cx="245" cy="62"  r="0.9" fill="#f0f9ff"/>
    <!-- Mid-field stars -->
    <circle cx="55"  cy="75"  r="0.5" fill="#e0f2fe"/>
    <circle cx="72"  cy="105" r="0.6" fill="#bae6fd"/>
    <circle cx="48"  cy="135" r="0.4" fill="#f0f9ff"/>
    <circle cx="60"  cy="170" r="0.5" fill="#e0f2fe"/>
    <circle cx="75"  cy="195" r="0.6" fill="#bae6fd"/>
    <circle cx="190" cy="85"  r="0.5" fill="#f0f9ff"/>
    <circle cx="205" cy="115" r="0.4" fill="#e0f2fe"/>
    <circle cx="195" cy="148" r="0.6" fill="#bae6fd"/>
    <circle cx="180" cy="178" r="0.5" fill="#f0f9ff"/>
    <circle cx="200" cy="200" r="0.4" fill="#e0f2fe"/>
  </g>

  <!-- ═══ ORBIT RING 1 — innermost, tilted ~15deg, r≈38 ═══ -->
  <!-- Glowing ellipse: slight tilt simulated via transform -->
  <g transform="translate(128,128) rotate(-15)" filter="url(#orbitLineGlow)">
    <ellipse cx="0" cy="0" rx="40" ry="14" fill="none"
             stroke="url(#orbitGlow1)" stroke-width="1.0" opacity="0.85"/>
  </g>
  <!-- Sharper crisp line on top -->
  <g transform="translate(128,128) rotate(-15)">
    <ellipse cx="0" cy="0" rx="40" ry="14" fill="none"
             stroke="#22d3ee" stroke-width="0.5" opacity="0.6"/>
  </g>

  <!-- ═══ ORBIT RING 2 — medium, tilted ~-25deg, r≈62 ═══ -->
  <g transform="translate(128,128) rotate(25)" filter="url(#orbitLineGlow)">
    <ellipse cx="0" cy="0" rx="64" ry="22" fill="none"
             stroke="url(#orbitGlow2)" stroke-width="1.0" opacity="0.75"/>
  </g>
  <g transform="translate(128,128) rotate(25)">
    <ellipse cx="0" cy="0" rx="64" ry="22" fill="none"
             stroke="#38bdf8" stroke-width="0.5" opacity="0.5"/>
  </g>

  <!-- ═══ ORBIT RING 3 — outer, tilted ~-50deg, r≈88 ═══ -->
  <g transform="translate(128,128) rotate(-50)" filter="url(#orbitLineGlow)">
    <ellipse cx="0" cy="0" rx="90" ry="30" fill="none"
             stroke="url(#orbitGlow3)" stroke-width="1.0" opacity="0.65"/>
  </g>
  <g transform="translate(128,128) rotate(-50)">
    <ellipse cx="0" cy="0" rx="90" ry="30" fill="none"
             stroke="#818cf8" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- ═══ ORBIT RING 4 — outermost near-circular, r≈108 ═══ -->
  <g transform="translate(128,128) rotate(10)" filter="url(#orbitLineGlow)">
    <ellipse cx="0" cy="0" rx="108" ry="38" fill="none"
             stroke="#22d3ee" stroke-width="0.8" opacity="0.35"/>
  </g>

  <!-- ═══ MEMORY PLANETS ═══ -->
  <!-- Planet on ring 1 — bright cyan, upper right -->
  <g filter="url(#planetGlow)">
    <circle cx="165" cy="116" r="5.5" fill="url(#planet1)"/>
    <circle cx="165" cy="116" r="5.5" fill="none" stroke="#67e8f9" stroke-width="0.8" opacity="0.8"/>
  </g>

  <!-- Planet on ring 2 — sky blue, lower left -->
  <g filter="url(#planetGlow)">
    <circle cx="71"  cy="148" r="6.5" fill="url(#planet2)"/>
    <circle cx="71"  cy="148" r="6.5" fill="none" stroke="#7dd3fc" stroke-width="0.8" opacity="0.8"/>
  </g>

  <!-- Small memory dot on ring 2, upper left -->
  <g filter="url(#planetGlow)">
    <circle cx="82"  cy="110" r="3.5" fill="url(#planet4)"/>
    <circle cx="82"  cy="110" r="3.5" fill="none" stroke="#86efac" stroke-width="0.7" opacity="0.7"/>
  </g>

  <!-- Planet on ring 3 — violet, lower right -->
  <g filter="url(#planetGlow)">
    <circle cx="201" cy="156" r="7.0" fill="url(#planet3)"/>
    <circle cx="201" cy="156" r="7.0" fill="none" stroke="#c4b5fd" stroke-width="0.8" opacity="0.8"/>
  </g>

  <!-- Small dot on ring 3, upper area -->
  <g filter="url(#planetGlow)">
    <circle cx="70"  cy="86"  r="3.0" fill="url(#planet5)"/>
    <circle cx="70"  cy="86"  r="3.0" fill="none" stroke="#fca5a5" stroke-width="0.6" opacity="0.7"/>
  </g>

  <!-- Small dot on ring 4, right -->
  <g filter="url(#planetGlow)">
    <circle cx="225" cy="122" r="4.0" fill="url(#planet2)"/>
    <circle cx="225" cy="122" r="4.0" fill="none" stroke="#7dd3fc" stroke-width="0.6" opacity="0.6"/>
  </g>

  <!-- Tiny dot on ring 4, bottom left -->
  <g filter="url(#planetGlow)">
    <circle cx="38"  cy="155" r="2.5" fill="url(#planet1)"/>
  </g>

  <!-- Tiny dot on ring 1, left side -->
  <g>
    <circle cx="91"  cy="131" r="2.0" fill="#67e8f9" opacity="0.7"/>
  </g>

  <!-- ═══ SUN ═══ -->
  <!-- Corona outer glow (wide, soft) -->
  <circle cx="128" cy="128" r="42" fill="url(#sunCorona)" opacity="0.9"/>
  <circle cx="128" cy="128" r="34" fill="url(#sunCorona)" opacity="0.7"/>

  <!-- Sun body with glow filter -->
  <g filter="url(#sunGlow)">
    <circle cx="128" cy="128" r="22" fill="url(#sunCore)"/>
  </g>

  <!-- Sun crisp edge highlight -->
  <circle cx="128" cy="128" r="22" fill="none"
          stroke="#fde68a" stroke-width="1.0" opacity="0.6"/>

  <!-- Sun inner specular highlight -->
  <ellipse cx="122" cy="121" rx="8" ry="5" fill="white" opacity="0.2"/>

  <!-- ═══ SUN RAYS — 8 subtle spikes ═══ -->
  <g transform="translate(128,128)" opacity="0.55">
    <!-- 8 rays at 45deg intervals -->
    <line x1="0" y1="-24" x2="0"    y2="-30" stroke="#fde68a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="-24" x2="0"    y2="-34" stroke="#fde68a" stroke-width="0.7" stroke-linecap="round"/>

    <line x1="17"  y1="-17"  x2="21"  y2="-21"  stroke="#fde68a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="17"  y1="-17"  x2="23"  y2="-23"  stroke="#fde68a" stroke-width="0.7" stroke-linecap="round"/>

    <line x1="24" y1="0" x2="30" y2="0"   stroke="#fde68a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="24" y1="0" x2="34" y2="0"   stroke="#fde68a" stroke-width="0.7" stroke-linecap="round"/>

    <line x1="17"  y1="17"  x2="21"  y2="21"   stroke="#fde68a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="17"  y1="17"  x2="23"  y2="23"   stroke="#fde68a" stroke-width="0.7" stroke-linecap="round"/>

    <line x1="0" y1="24" x2="0"    y2="30"   stroke="#fde68a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="24" x2="0"    y2="34"   stroke="#fde68a" stroke-width="0.7" stroke-linecap="round"/>

    <line x1="-17" y1="17"  x2="-21" y2="21"   stroke="#fde68a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-17" y1="17"  x2="-23" y2="23"   stroke="#fde68a" stroke-width="0.7" stroke-linecap="round"/>

    <line x1="-24" y1="0" x2="-30" y2="0"  stroke="#fde68a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-24" y1="0" x2="-34" y2="0"  stroke="#fde68a" stroke-width="0.7" stroke-linecap="round"/>

    <line x1="-17" y1="-17" x2="-21" y2="-21"  stroke="#fde68a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-17" y1="-17" x2="-23" y2="-23"  stroke="#fde68a" stroke-width="0.7" stroke-linecap="round"/>
  </g>

  <!-- Final rounded rect border glow (subtle blue rim) -->
  <rect x="1" y="1" width="254" height="254" rx="47" ry="47" fill="none"
        stroke="#1e40af" stroke-width="1.5" opacity="0.25"/>
</svg>
